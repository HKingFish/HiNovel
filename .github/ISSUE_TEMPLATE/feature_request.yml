name: 功能建议
description: 提出新功能或改进建议
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你的建议！请尽量描述使用场景，方便维护者评估优先级。

  - type: textarea
    id: problem
    attributes:
      label: 问题 / 场景
      description: 你遇到了什么问题，或希望在什么场景下使用此功能？
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 期望方案
      description: 你期望的功能行为或交互方式
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 备选方案
      description: 是否考虑过其他实现方式？
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: 相关模块
      options:
        - 前端 (hinovel-web)
        - 后端 (hinovel-server)
        - Agent / AI
        - 部署 / DevOps
        - 文档
        - 其他
    validations:
      required: true
